title: "TransGuide UK"
description: "A calm, factual resource hub supporting transgender people and allies across the UK."
theme: jekyll-theme-cayman

markdown: kramdown
highlighter: rouge

author: "TransGuide UK"

# GitHub Pages URL settings
url: "https://emma-on-github.github.io"
baseurl: "/transguide-uk"

# Navigation links
nav_links:
  - name: "Homepage"
    url: "/"
  - name: "About"
    url: "/about"
  - name: "Myths Busting"
    url: "/myths-busting"
  - name: "Healthcare Resources"
    url: "/healthcare-resources"
  - name: "Legal Rights"
    url: "/legal-rights"
  - name: "Change Names"
    url: "/change-names"
  - name: "Support Organisations"
    url: "/support-organisations"
  - name: "Latest Updates"
    url: "/latest-updates"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

seo:
  type: "website"
  name: "TransGuide UK"
